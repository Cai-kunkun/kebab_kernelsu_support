name: Build OnePlus SM8250 Kernel

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    env:
      ARCH: arm64
      SUBARCH: arm64
      LLVM: 1
      LLVM_IAS: 1

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install dependencies
        run: |
          sudo apt update

          sudo apt install -y \
            bc \
            bison \
            flex \
            build-essential \
            libssl-dev \
            libelf-dev \
            libncurses-dev \
            python3 \
            rsync \
            cpio \
            lz4 \
            zip

      # GitHub runner 默认磁盘比较紧张
      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/share/dotnet

      - name: Setup Android clang
        run: |
          git clone --depth=1 \
            https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 \
            $HOME/clang

          echo "$HOME/clang/clang-r399163b/bin" >> $GITHUB_PATH


      - name: Check compiler
        run: |
          clang --version
          ld.lld --version


      - name: Prepare kernel config
        run: |

          mkdir -p out

          make \
            O=out \
            ARCH=arm64 \
            LLVM=1 \
            LLVM_IAS=1 \
            vendor/kona_defconfig


      - name: Build kernel
        run: |

          make \
            O=out \
            ARCH=arm64 \
            LLVM=1 \
            LLVM_IAS=1 \
            -j$(nproc)


      - name: Collect output
        run: |

          mkdir -p artifacts

          cp out/.config artifacts/kernel.config

          cp out/arch/arm64/boot/Image \
            artifacts/ 2>/dev/null || true

          cp out/arch/arm64/boot/Image.gz \
            artifacts/ 2>/dev/null || true

          cp out/arch/arm64/boot/Image.lz4 \
            artifacts/ 2>/dev/null || true

          cp out/arch/arm64/boot/Image.lz4-dtb \
            artifacts/ 2>/dev/null || true


      - name: Upload kernel
        uses: actions/upload-artifact@v4
        with:
          name: oneplus-sm8250-kernel
          path: artifacts
