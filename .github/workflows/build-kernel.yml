name: Build kebab kernel

on:
  workflow_dispatch:
    inputs:
      profile:
        description: Build profile
        required: true
        default: official
        type: choice
        options:
          - official
          - ksu-susfs
          - both

  push:
    branches:
      - master
      - main


jobs:

  build:

    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        profile:
          - ${{ github.event.inputs.profile || 'official' }}


    steps:

    - name: Checkout builder
      uses: actions/checkout@v4


    - name: Install dependencies
      run: |
        sudo apt update

        sudo apt install -y \
          bc \
          bison \
          flex \
          build-essential \
          ccache \
          clang \
          lld \
          llvm \
          curl \
          git \
          libssl-dev \
          libelf-dev \
          python3 \
          rsync


    - name: Setup ccache
      uses: hendrikmuhs/ccache-action@v1
      with:
        key: kernel-kebab


    - name: Clone kernel source
      run: |
        git clone \
          --depth=1 \
          -b lineage-23.2 \
          https://github.com/LineageOS/android_kernel_oneplus_sm8250 \
          kernel


    - name: Prepare kernel
      run: |
        cd kernel

        mkdir -p out

        echo "== Clean source tree =="

        make mrproper


        echo "== Generate defconfig =="

        make \
          O=out \
          ARCH=arm64 \
          vendor/kona_defconfig


        echo "== Disable incompatible SCHGM =="

        scripts/config \
          --file out/.config \
          --disable CONFIG_QCOM_SCHGM || true

        scripts/config \
          --file out/.config \
          --disable CONFIG_QCOM_SCHGM_FLASH || true

        scripts/config \
          --file out/.config \
          --disable CONFIG_SCHGM_FLASH || true


        echo "== Sync config =="

        make \
          O=out \
          ARCH=arm64 \
          olddefconfig


        echo "========== SCHGM CONFIG =========="

        grep SCHGM out/.config || true


        echo "========== CONFIG CHECK =========="

        test -f out/.config


    - name: Build kernel
      env:
        PROFILE: ${{ matrix.profile }}
        KCONFIG_NOSILENTUPDATE: 1
      run: |

        chmod +x scripts/*.sh

        ./scripts/build.sh


    - name: Upload kernel image
      uses: actions/upload-artifact@v4
      with:
        name: kebab-${{ matrix.profile }}
        path: |
          kernel/out/arch/arm64/boot/Image*