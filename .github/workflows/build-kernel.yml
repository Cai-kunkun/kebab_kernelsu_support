name: Build kebab kernel

on:
  workflow_dispatch:
    inputs:
      profile:
        description: Build profile
        required: true
        default: official
        type: choice
        options:
          - official
          - ksu-susfs
          - both

  push:
    branches:
      - master
      - main


jobs:

  build:

    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        profile:
          - ${{ github.event.inputs.profile || 'official' }}

    steps:

    - name: Checkout builder
      uses: actions/checkout@v4


    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          bc \
          bison \
          flex \
          build-essential \
          ccache \
          clang \
          lld \
          llvm \
          curl \
          git \
          libssl-dev \
          libelf-dev \
          python3 \
          rsync


    - name: Setup ccache
      uses: hendrikmuhs/ccache-action@v1
      with:
        key: kernel-kebab


    - name: Clone kernel source
      run: |
        git clone \
          https://github.com/LineageOS/android_kernel_oneplus_sm8250 \
          kernel

        cd kernel

        git checkout lineage-23.2

        echo "========== Kernel commit =========="
        git rev-parse HEAD


    - name: Verify qcom driver consistency
      run: |
        cd kernel

        echo "schgm-flash:"
        git log -1 -- drivers/power/supply/qcom/schgm-flash.c

        echo "smb-lib:"
        git log -1 -- drivers/power/supply/qcom/smb-lib.h


    - name: Build kernel
      env:
        PROFILE: ${{ matrix.profile }}
      run: |

        chmod +x scripts/*.sh

        ./scripts/setup.sh

        ./scripts/build.sh


    - name: Upload kernel image
      uses: actions/upload-artifact@v4
      with:
        name: kebab-${{ matrix.profile }}
        path: |
          kernel/out/arch/arm64/boot/Image.gz*