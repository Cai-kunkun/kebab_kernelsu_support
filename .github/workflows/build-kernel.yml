name: Build kebab kernel

on:
  workflow_dispatch:
    inputs:
      profile:
        description: Build profile
        required: true
        default: official
        type: choice
        options:
          - official
          - ksu-susfs
          - both

  push:
    branches:
      - main
      - master

  schedule:
    - cron: "0 0 * * 0"


jobs:

  build:

    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        profile:
          - ${{ github.event.inputs.profile || 'official' }}


    steps:

    - name: Checkout builder
      uses: actions/checkout@v4


    - name: Install dependencies
      run: |
        sudo apt update

        sudo apt install -y \
          bc \
          bison \
          flex \
          build-essential \
          ccache \
          curl \
          git \
          libssl-dev \
          libelf-dev \
          python3 \
          rsync \
          lld \
          clang \
          llvm


    - name: Setup ccache
      uses: hendrikmuhs/ccache-action@v1
      with:
        key: kernel-kebab


    - name: Clone kernel source
      run: |
        git clone \
          --depth=1 \
          -b lineage-23.2 \
          https://github.com/LineageOS/android_kernel_oneplus_sm8250 \
          kernel


        cd kernel


        echo "========== Kernel information =========="

        echo "Commit:"
        git rev-parse HEAD


        echo "Branch:"
        git branch


        echo "========================================"


        echo "Checking smb_charger:"
        grep -R "struct smb_charger" -n drivers/power/supply/qcom/ || true


        echo "Checking smb_irq_data:"
        grep -R "struct smb_irq_data" -n drivers/power/supply/qcom/ || true


        echo "Checking smblib_read:"
        grep -R "smblib_read" -n drivers/power/supply/qcom/ || true


        echo "Checking clang:"
        clang --version


        echo "Checking ld.lld:"
        ld.lld --version



    - name: Build kernel
      env:
        PROFILE: ${{ matrix.profile }}

      run: |
        chmod +x scripts/*.sh

        ./scripts/setup.sh

        ./scripts/build.sh



    - name: Check output
      if: always()
      run: |
        ls -lah kernel/out/arch/arm64/boot/ || true



    - name: Upload kernel image
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: kebab-${{ matrix.profile }}
        path: |
          kernel/out/arch/arm64/boot/Image.gz*